name: Post to Instagram

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 11 * * *'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install node-fetch

      - run: node run_instagram.mjs
        env:
          # 複数のキー名に対応
          IG_ACCOUNT_ID: <LaTex>${{ secrets.IG_ACCOUNT_ID }}
          INSTAGRAM_ACCOUNT_ID: $</LaTex>{{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: <LaTex>${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: $</LaTex>{{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FB_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
