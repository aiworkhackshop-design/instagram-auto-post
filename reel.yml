name: Post Reels

on:
  schedule:
    - cron: '0 3 * * 1,3,5'

  workflow_dispatch:

jobs:
  reel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install

      - run: node run_reel.mjs
        env:
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
